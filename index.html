<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --border-soft: #1e1e1e;
    --text: #f0f0f0;
    --muted: #666;
    --dim: #333;
    --accent: #c8f135;
    --accent-dim: rgba(200,241,53,0.12);
    --accent-text: #0e0e0e;
    --done: #4ade80;
    --done-dim: rgba(74,222,128,0.1);
    --danger: #f87171;
    --radius: 8px;
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    min-height: 100vh;
    line-height: 1.6;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }

  header h1 {
    font-family: var(--display);
    font-size: 1.2rem;
    font-weight: 800;
    letter-spacing: -0.01em;
    color: var(--text);
  }

  header h1 span { color: var(--accent); }

  .header-stats {
    display: flex;
    gap: 1.5rem;
    font-size: 12px;
    color: var(--muted);
  }

  .header-stats strong { color: var(--accent); font-weight: 500; }

  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: calc(100vh - 65px);
  }

  .sidebar {
    border-right: 1px solid var(--border);
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .sidebar-title {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }

  .add-project-form {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  input, textarea {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 10px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus, textarea:focus { border-color: var(--accent); }
  input::placeholder, textarea::placeholder { color: var(--dim); }
  textarea { resize: vertical; min-height: 60px; }

  button {
    font-family: var(--mono);
    font-size: 13px;
    cursor: pointer;
    border: none;
    border-radius: var(--radius);
    padding: 8px 14px;
    transition: all 0.15s;
  }

  .btn-accent {
    background: var(--accent);
    color: var(--accent-text);
    font-weight: 500;
    width: 100%;
  }

  .btn-accent:hover { background: #d4f54a; }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    font-size: 12px;
    padding: 5px 10px;
  }

  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid transparent;
    font-size: 12px;
    padding: 4px 8px;
    opacity: 0.6;
  }

  .btn-danger:hover { opacity: 1; border-color: var(--danger); }

  .project-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    overflow-y: auto;
  }

  .project-item {
    padding: 10px 12px;
    border-radius: var(--radius);
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .project-item:hover { background: var(--surface); border-color: var(--border); }

  .project-item.active {
    background: var(--accent-dim);
    border-color: var(--accent);
  }

  .project-item-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .project-item.active .project-item-name { color: var(--accent); }

  .project-item-meta {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .mini-bar {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .mini-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.3s;
  }

  .mini-bar-fill.complete { background: var(--done); }

  .main {
    padding: 2rem;
    overflow-y: auto;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 1rem;
    color: var(--muted);
    text-align: center;
  }

  .empty-icon {
    font-size: 3rem;
    opacity: 0.2;
    font-family: var(--display);
    font-weight: 800;
  }

  .project-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 2rem;
    gap: 1rem;
  }

  .project-name {
    font-family: var(--display);
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .project-desc {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    max-width: 500px;
    line-height: 1.7;
  }

  .progress-section {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
  }

  .stat-n {
    font-family: var(--display);
    font-size: 2rem;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }

  .stat-n.done-color { color: var(--done); }

  .stat-l {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .progress-bar-big {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    margin-bottom: 2rem;
    overflow: hidden;
  }

  .progress-bar-big-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .progress-bar-big-fill.complete { background: var(--done); }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .section-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .add-topic-row {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
    align-items: flex-start;
  }

  .add-topic-row input { flex: 1; }
  .add-topic-row textarea { flex: 2; }
  .add-topic-row button { white-space: nowrap; align-self: flex-start; margin-top: 0; }

  .topics-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .topic-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: border-color 0.15s;
    cursor: pointer;
  }

  .topic-card:hover { border-color: var(--dim); }

  .topic-card.done {
    background: var(--done-dim);
    border-color: rgba(74,222,128,0.2);
  }

  .topic-check {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--dim);
    border-radius: 4px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    cursor: pointer;
  }

  .topic-card.done .topic-check {
    background: var(--done);
    border-color: var(--done);
  }

  .topic-check-mark {
    width: 10px;
    height: 8px;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .topic-card.done .topic-check-mark { opacity: 1; }

  .topic-body { flex: 1; min-width: 0; }

  .topic-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    transition: color 0.15s;
  }

  .topic-card.done .topic-name {
    color: var(--done);
    text-decoration: line-through;
    opacity: 0.7;
  }

  .topic-explanation {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    line-height: 1.6;
  }

  .topic-card.done .topic-explanation { opacity: 0.5; }

  .topic-actions { display: flex; gap: 4px; opacity: 0; transition: opacity 0.15s; }
  .topic-card:hover .topic-actions { opacity: 1; }

  .badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-weight: 500;
  }

  .badge-done { background: var(--done-dim); color: var(--done); }
  .badge-todo { background: var(--accent-dim); color: var(--accent); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
    .progress-section { grid-template-columns: 1fr 1fr; }
    .add-topic-row { flex-direction: column; }
    header { padding: 1rem; }
    .main { padding: 1rem; }
    .header-stats { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>study<span>.</span>track</h1>
  <div class="header-stats">
    <span>projects: <strong id="hdr-projects">0</strong></span>
    <span>topics done: <strong id="hdr-done">0</strong>/<strong id="hdr-total">0</strong></span>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div>
      <div class="sidebar-title">New project</div>
      <div class="add-project-form">
        <input type="text" id="proj-name" placeholder="Project name" maxlength="60">
        <textarea id="proj-desc" placeholder="What is this project? (optional)" rows="2"></textarea>
        <button class="btn-accent" onclick="addProject()">+ Add project</button>
      </div>
    </div>
    <hr class="divider" style="margin:0">
    <div>
      <div class="sidebar-title">Projects</div>
      <div class="project-list" id="project-list">
      </div>
    </div>
  </aside>

  <main class="main" id="main-panel">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">{ }</div>
      <div>
        <div style="font-size:15px;color:var(--text);margin-bottom:6px;">No project selected</div>
        <div>Create a project and add what you need to study.</div>
      </div>
    </div>

    <div id="project-view" style="display:none;">
      <div class="project-header">
        <div>
          <div class="project-name" id="view-name"></div>
          <div class="project-desc" id="view-desc"></div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
          <span id="view-badge" class="badge"></span>
          <button class="btn-danger" onclick="deleteProject()">delete</button>
        </div>
      </div>

      <div class="progress-section">
        <div class="stat-card">
          <div class="stat-n" id="stat-total">0</div>
          <div class="stat-l">Topics total</div>
        </div>
        <div class="stat-card">
          <div class="stat-n done-color" id="stat-done">0</div>
          <div class="stat-l">Completed</div>
        </div>
        <div class="stat-card">
          <div class="stat-n" id="stat-pct">0%</div>
          <div class="stat-l">Progress</div>
        </div>
      </div>

      <div class="progress-bar-big">
        <div class="progress-bar-big-fill" id="big-bar" style="width:0%"></div>
      </div>

      <div class="section-header">
        <span class="section-label">Study topics</span>
        <button class="btn-ghost" onclick="clearDone()">clear done</button>
      </div>

      <div class="add-topic-row">
        <input type="text" id="topic-name" placeholder="Topic name (e.g. Linked lists)" style="flex:1">
        <textarea id="topic-exp" placeholder="Why you need it / what to study" rows="1" style="flex:2;min-height:36px;"></textarea>
        <button class="btn-accent" style="width:auto;" onclick="addTopic()">+ Add</button>
      </div>

      <div class="topics-grid" id="topics-grid"></div>

      <div id="no-topics" style="color:var(--muted);font-size:13px;padding:2rem 0;display:none;">
        No topics yet — add what you need to study for this project.
      </div>
    </div>
  </main>
</div>

<script>
let data = JSON.parse(localStorage.getItem('study-tracker-v1') || '{"projects":[]}');
let activeId = null;

function save() {
  localStorage.setItem('study-tracker-v1', JSON.stringify(data));
  renderSidebar();
  updateHeader();
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

function addProject() {
  const name = document.getElementById('proj-name').value.trim();
  if (!name) return;
  const desc = document.getElementById('proj-desc').value.trim();
  const p = { id: uid(), name, desc, topics: [], created: Date.now() };
  data.projects.unshift(p);
  document.getElementById('proj-name').value = '';
  document.getElementById('proj-desc').value = '';
  save();
  selectProject(p.id);
}

function deleteProject() {
  if (!activeId) return;
  if (!confirm('Delete this project?')) return;
  data.projects = data.projects.filter(p => p.id !== activeId);
  activeId = null;
  save();
  showEmpty();
}

function selectProject(id) {
  activeId = id;
  renderSidebar();
  renderProject();
}

function addTopic() {
  const name = document.getElementById('topic-name').value.trim();
  if (!name || !activeId) return;
  const exp = document.getElementById('topic-exp').value.trim();
  const proj = data.projects.find(p => p.id === activeId);
  if (!proj) return;
  proj.topics.push({ id: uid(), name, exp, done: false });
  document.getElementById('topic-name').value = '';
  document.getElementById('topic-exp').value = '';
  save();
  renderProject();
}

function toggleTopic(tid) {
  const proj = data.projects.find(p => p.id === activeId);
  if (!proj) return;
  const t = proj.topics.find(t => t.id === tid);
  if (t) t.done = !t.done;
  save();
  renderProject();
}

function deleteTopic(tid) {
  const proj = data.projects.find(p => p.id === activeId);
  if (!proj) return;
  proj.topics = proj.topics.filter(t => t.id !== tid);
  save();
  renderProject();
}

function clearDone() {
  const proj = data.projects.find(p => p.id === activeId);
  if (!proj) return;
  proj.topics = proj.topics.filter(t => !t.done);
  save();
  renderProject();
}

function renderSidebar() {
  const list = document.getElementById('project-list');
  if (!data.projects.length) {
    list.innerHTML = '<div style="color:var(--muted);font-size:12px;padding:8px 0;">No projects yet.</div>';
    return;
  }
  list.innerHTML = data.projects.map(p => {
    const total = p.topics.length;
    const done = p.topics.filter(t => t.done).length;
    const pct = total ? Math.round((done/total)*100) : 0;
    const active = p.id === activeId ? ' active' : '';
    return `<div class="project-item${active}" onclick="selectProject('${p.id}')">
      <div class="project-item-name">${esc(p.name)}</div>
      <div class="project-item-meta">
        <span>${done}/${total}</span>
        <div class="mini-bar"><div class="mini-bar-fill${pct===100?' complete':''}" style="width:${pct}%"></div></div>
        <span>${pct}%</span>
      </div>
    </div>`;
  }).join('');
}

function renderProject() {
  const proj = data.projects.find(p => p.id === activeId);
  if (!proj) { showEmpty(); return; }

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('project-view').style.display = 'block';

  document.getElementById('view-name').textContent = proj.name;
  document.getElementById('view-desc').textContent = proj.desc || '';

  const total = proj.topics.length;
  const done = proj.topics.filter(t => t.done).length;
  const pct = total ? Math.round((done/total)*100) : 0;
  const complete = pct === 100 && total > 0;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-pct').textContent = pct + '%';
  const bar = document.getElementById('big-bar');
  bar.style.width = pct + '%';
  bar.className = 'progress-bar-big-fill' + (complete ? ' complete' : '');

  const badge = document.getElementById('view-badge');
  if (complete) { badge.textContent = 'complete'; badge.className = 'badge badge-done'; }
  else { badge.textContent = 'in progress'; badge.className = 'badge badge-todo'; }

  const grid = document.getElementById('topics-grid');
  const noTopics = document.getElementById('no-topics');

  if (!total) {
    grid.innerHTML = '';
    noTopics.style.display = 'block';
    return;
  }
  noTopics.style.display = 'none';

  const todo = proj.topics.filter(t => !t.done);
  const doneList = proj.topics.filter(t => t.done);
  const ordered = [...todo, ...doneList];

  grid.innerHTML = ordered.map(t => `
    <div class="topic-card${t.done?' done':''}" onclick="toggleTopic('${t.id}')">
      <div class="topic-check">
        <svg class="topic-check-mark" viewBox="0 0 10 8" fill="none">
          <path d="M1 4l3 3 5-6" stroke="#0e0e0e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="topic-body">
        <div class="topic-name">${esc(t.name)}</div>
        ${t.exp ? `<div class="topic-explanation">${esc(t.exp)}</div>` : ''}
      </div>
      <div class="topic-actions">
        <button class="btn-danger" onclick="event.stopPropagation();deleteTopic('${t.id}')">✕</button>
      </div>
    </div>
  `).join('');
}

function showEmpty() {
  document.getElementById('empty-state').style.display = 'flex';
  document.getElementById('project-view').style.display = 'none';
}

function updateHeader() {
  document.getElementById('hdr-projects').textContent = data.projects.length;
  const allTopics = data.projects.flatMap(p => p.topics);
  document.getElementById('hdr-total').textContent = allTopics.length;
  document.getElementById('hdr-done').textContent = allTopics.filter(t => t.done).length;
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('proj-name').addEventListener('keydown', e => { if (e.key === 'Enter') addProject(); });
document.getElementById('topic-name').addEventListener('keydown', e => { if (e.key === 'Enter') addTopic(); });

renderSidebar();
updateHeader();
if (data.projects.length) selectProject(data.projects[0].id);
</script>
</body>
</html>
