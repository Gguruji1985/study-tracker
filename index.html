<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>study.track</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%230e0e0e'/><path d='M7 12l5 4-5 4' stroke='%23c8f135' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round' fill='none'/><line x1='16' y1='20' x2='26' y2='20' stroke='%23c8f135' stroke-width='2.2' stroke-linecap='round'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0e0e;--surface:#161616;--surface2:#1c1c1c;--border:#2a2a2a;--text:#f0f0f0;--muted:#666;--dim:#333;--accent:#c8f135;--accent-dim:rgba(200,241,53,0.1);--accent-mid:rgba(200,241,53,0.2);--done:#4ade80;--done-dim:rgba(74,222,128,0.08);--danger:#f87171;--r:8px;--mono:'DM Mono',monospace;--display:'Syne',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:14px;min-height:100vh;line-height:1.6}
header{border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:10}
header h1{font-family:var(--display);font-size:1.1rem;font-weight:800;letter-spacing:-0.01em}
header h1 span{color:var(--accent)}
.hstats{display:flex;gap:1.5rem;font-size:12px;color:var(--muted)}
.hstats strong{color:var(--accent);font-weight:500}
.layout{display:grid;grid-template-columns:270px 1fr;min-height:calc(100vh - 57px)}
aside{border-right:1px solid var(--border);padding:1.25rem;display:flex;flex-direction:column;gap:1rem;overflow-y:auto}
.slabel{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.25rem}
input,textarea{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:var(--mono);font-size:13px;padding:7px 10px;width:100%;outline:none;transition:border-color .15s}
input:focus,textarea:focus{border-color:var(--accent)}
input::placeholder,textarea::placeholder{color:var(--dim)}
textarea{resize:vertical;min-height:52px}
button{font-family:var(--mono);font-size:13px;cursor:pointer;border:none;border-radius:var(--r);padding:7px 12px;transition:all .15s}
.btn-accent{background:var(--accent);color:#0e0e0e;font-weight:500;width:100%}
.btn-accent:hover{background:#d4f54a}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);font-size:12px;padding:5px 10px}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-del{background:transparent;color:var(--danger);border:1px solid transparent;font-size:11px;padding:3px 7px;opacity:.5}
.btn-del:hover{opacity:1;border-color:var(--danger)}
.proj-list{display:flex;flex-direction:column;gap:3px;flex:1;overflow-y:auto}
.proj-item{padding:9px 11px;border-radius:var(--r);border:1px solid transparent;cursor:pointer;transition:all .15s}
.proj-item:hover{background:var(--surface);border-color:var(--border)}
.proj-item.active{background:var(--accent-dim);border-color:rgba(200,241,53,.3)}
.proj-item-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.proj-item.active .proj-item-name{color:var(--accent)}
.proj-item-meta{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-top:3px}
.mini-bar{flex:1;height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.mini-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}
.mini-fill.c{background:var(--done)}
main{padding:2rem;overflow-y:auto}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:1rem;color:var(--muted);text-align:center}
.empty-icon{font-family:var(--display);font-size:3rem;font-weight:800;opacity:.15}
.proj-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;gap:1rem}
.proj-name-big{font-family:var(--display);font-size:1.8rem;font-weight:800;letter-spacing:-.02em;line-height:1.1}
.proj-desc-big{font-size:13px;color:var(--muted);margin-top:5px;max-width:500px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.scard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:.875rem}
.sn{font-family:var(--display);font-size:1.6rem;font-weight:800;color:var(--accent);line-height:1}
.sn.g{color:var(--done)}
.sl{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:.04em;text-transform:uppercase}
.big-bar{height:5px;background:var(--border);border-radius:3px;margin-bottom:1.75rem;overflow:hidden}
.big-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s ease}
.big-fill.c{background:var(--done)}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.875rem}
.add-row{display:flex;gap:8px;margin-bottom:1.5rem;align-items:flex-start}
.add-row input{flex:1}
.add-row textarea{flex:2;min-height:36px}
.add-row button{white-space:nowrap;width:auto}
.topics-list{display:flex;flex-direction:column;gap:6px}
.topic-block{border:1px solid var(--border);border-radius:var(--r);background:var(--surface);overflow:hidden;transition:border-color .15s}
.topic-block:hover{border-color:var(--dim)}
.topic-block.done-block{background:var(--done-dim);border-color:rgba(74,222,128,.15)}
.topic-row{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.check{width:17px;height:17px;border:1.5px solid var(--dim);border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.done-block .check{background:var(--done);border-color:var(--done)}
.chk-svg{width:9px;height:7px;opacity:0;transition:opacity .15s}
.done-block .chk-svg{opacity:1}
.topic-info{flex:1;min-width:0}
.topic-title{font-size:13px;font-weight:500;color:var(--text);transition:color .15s}
.done-block .topic-title{color:var(--done);text-decoration:line-through;opacity:.7}
.topic-sub-count{font-size:11px;color:var(--muted);margin-top:2px}
.topic-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.topic-pct{font-size:11px;color:var(--muted);min-width:30px;text-align:right}
.done-block .topic-pct{color:var(--done)}
.expand-btn{font-size:10px;color:var(--muted);background:transparent;border:none;padding:2px 5px;cursor:pointer;transition:transform .2s}
.expand-btn.open{transform:rotate(90deg)}
.subtopics-panel{border-top:1px solid var(--border);padding:10px 14px;display:flex;flex-direction:column;gap:5px}
.done-block .subtopics-panel{border-top-color:rgba(74,222,128,.15)}
.sub-item{display:flex;align-items:center;gap:9px;padding:5px 6px;border-radius:6px;cursor:pointer;transition:background .1s}
.sub-item:hover{background:var(--surface2)}
.done-block .sub-item:hover{background:rgba(74,222,128,.05)}
.sub-check{width:14px;height:14px;border:1.5px solid var(--dim);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.sub-item.sdone .sub-check{background:var(--done);border-color:var(--done)}
.sub-chk-svg{width:7px;height:6px;opacity:0;transition:opacity .15s}
.sub-item.sdone .sub-chk-svg{opacity:1}
.sub-name{font-size:12px;color:var(--text);flex:1}
.sub-item.sdone .sub-name{text-decoration:line-through;opacity:.45;color:var(--done)}
.sub-add-row{display:flex;gap:6px;margin-top:6px}
.sub-add-row input{flex:1;font-size:12px;padding:5px 8px}
.sub-add-row button{font-size:12px;padding:5px 10px;width:auto;background:var(--accent-mid);border:1px solid rgba(200,241,53,.3);color:var(--accent);border-radius:6px}
.sub-add-row button:hover{background:var(--accent);color:#0e0e0e}
.sub-del{background:transparent;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:0 3px;opacity:.4;transition:opacity .1s}
.sub-del:hover{opacity:1;color:var(--danger)}
.sub-copy{background:transparent;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:0 3px;opacity:.4;transition:all .1s}
.sub-copy:hover{opacity:1;color:var(--accent)}
.sub-copy.copied{color:var(--done);opacity:1}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase;font-weight:500}
.badge-done{background:var(--done-dim);color:var(--done)}
.badge-todo{background:var(--accent-dim);color:var(--accent)}
.divider{border:none;border-top:1px solid var(--border);margin:.75rem 0}
.t-actions{display:flex;gap:4px;opacity:0;transition:opacity .15s}
.topic-row:hover .t-actions{opacity:1}
@media(max-width:700px){.layout{grid-template-columns:1fr}aside{border-right:none;border-bottom:1px solid var(--border)}.stats-row{grid-template-columns:1fr 1fr}header{padding:.875rem 1rem}.hstats{display:none}main{padding:1rem}}
</style>
</head>
<body>
<header>
  <h1>study<span>.</span>track</h1>
  <div class="hstats">
    <span>projects: <strong id="h-proj">0</strong></span>
    <span>subtopics: <strong id="h-done">0</strong>/<strong id="h-total">0</strong></span>
  </div>
</header>
<div class="layout">
  <aside>
    <div>
      <div class="slabel">New project</div>
      <div style="display:flex;flex-direction:column;gap:7px">
        <input type="text" id="pname" placeholder="Project name" maxlength="60">
        <textarea id="pdesc" placeholder="Description (optional)" rows="2"></textarea>
        <button class="btn-accent" onclick="addProject()">+ Add project</button>
      </div>
    </div>
    <hr class="divider" style="margin:0">
    <div style="display:flex;flex-direction:column;gap:.4rem;flex:1;overflow:hidden">
      <div class="slabel">Projects</div>
      <div class="proj-list" id="proj-list"></div>
    </div>
  </aside>
  <main id="main">
    <div class="empty" id="empty">
      <div class="empty-icon">{ }</div>
      <div><div style="font-size:15px;color:var(--text);margin-bottom:5px">No project selected</div><div>Pick a project from the sidebar.</div></div>
    </div>
    <div id="pview" style="display:none">
      <div class="proj-hdr">
        <div>
          <div class="proj-name-big" id="v-name"></div>
          <div class="proj-desc-big" id="v-desc"></div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <span id="v-badge" class="badge"></span>
          <button class="btn-del" onclick="delProject()">delete</button>
        </div>
      </div>
      <div class="stats-row">
        <div class="scard"><div class="sn" id="s-topics">0</div><div class="sl">Topics</div></div>
        <div class="scard"><div class="sn" id="s-sub">0</div><div class="sl">Subtopics</div></div>
        <div class="scard"><div class="sn g" id="s-done">0</div><div class="sl">Completed</div></div>
        <div class="scard"><div class="sn" id="s-pct">0%</div><div class="sl">Progress</div></div>
      </div>
      <div class="big-bar"><div class="big-fill" id="big-fill" style="width:0%"></div></div>
      <div class="sec-hdr">
        <span class="slabel">Topics</span>
        <button class="btn-ghost" onclick="clearDone()">clear done</button>
      </div>
      <div class="add-row">
        <input type="text" id="tname" placeholder="Topic name">
        <textarea id="texp" placeholder="Why / what to study" rows="1" style="min-height:36px;flex:2"></textarea>
        <button class="btn-accent" onclick="addTopic()">+ Add</button>
      </div>
      <div class="topics-list" id="topics-list"></div>
      <div id="no-topics" style="color:var(--muted);font-size:13px;padding:2rem 0;display:none">No topics yet.</div>
    </div>
  </main>
</div>

let data = JSON.parse(localStorage.getItem('st-v2') || 'null');
if (!data) { data = JSON.parse(JSON.stringify(DEFAULT)); save(); }
let active = null;

function save(){ localStorage.setItem('st-v2', JSON.stringify(data)); renderSidebar(); updateHeader(); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,5); }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function addProject(){
  const n=document.getElementById('pname').value.trim(); if(!n) return;
  const d=document.getElementById('pdesc').value.trim();
  data.projects.unshift({id:uid(),name:n,desc:d,topics:[]});
  document.getElementById('pname').value=''; document.getElementById('pdesc').value='';
  save(); selectProject(data.projects[0].id);
}

function delProject(){
  if(!active||!confirm('Delete?')) return;
  data.projects=data.projects.filter(p=>p.id!==active);
  active=null; save(); showEmpty();
}

function selectProject(id){ active=id; renderSidebar(); renderProject(); }

function addTopic(){
  const n=document.getElementById('tname').value.trim(); if(!n||!active) return;
  const e=document.getElementById('texp').value.trim();
  const p=data.projects.find(p=>p.id===active); if(!p) return;
  p.topics.push({id:uid(),name:n,exp:e,subtopics:[]});
  document.getElementById('tname').value=''; document.getElementById('texp').value='';
  save(); renderProject();
}

function delTopic(tid){
  const p=data.projects.find(p=>p.id===active); if(!p) return;
  p.topics=p.topics.filter(t=>t.id!==tid); save(); renderProject();
}

function addSubtopic(tid){
  const inp=document.getElementById('si-'+tid); if(!inp) return;
  const n=inp.value.trim(); if(!n) return;
  const p=data.projects.find(p=>p.id===active); if(!p) return;
  const t=p.topics.find(t=>t.id===tid); if(!t) return;
  t.subtopics.push({id:uid(),name:n,done:false});
  inp.value=''; save(); renderProject(); openTopic(tid);
}

function toggleSub(tid,sid){
  const p=data.projects.find(p=>p.id===active); if(!p) return;
  const t=p.topics.find(t=>t.id===tid); if(!t) return;
  const s=t.subtopics.find(s=>s.id===sid); if(s) s.done=!s.done;
  save(); renderProject(); openTopic(tid);
}

function delSub(tid,sid){
  const p=data.projects.find(p=>p.id===active); if(!p) return;
  const t=p.topics.find(t=>t.id===tid); if(!t) return;
  t.subtopics=t.subtopics.filter(s=>s.id!==sid);
  save(); renderProject(); openTopic(tid);
}

function clearDone(){
  const p=data.projects.find(p=>p.id===active); if(!p) return;
  p.topics.forEach(t=>{ t.subtopics=t.subtopics.filter(s=>!s.done); });
  p.topics=p.topics.filter(t=>t.subtopics.length>0||true);
  save(); renderProject();
}

const openTopics=new Set();
function openTopic(tid){ openTopics.add(tid); }
function toggleExpand(tid){
  if(openTopics.has(tid)) openTopics.delete(tid); else openTopics.add(tid);
  renderProject();
}

function projStats(p){
  let totalSub=0,doneSub=0;
  p.topics.forEach(t=>{ totalSub+=t.subtopics.length; doneSub+=t.subtopics.filter(s=>s.done).length; });
  const pct=totalSub?Math.round(doneSub/totalSub*100):0;
  return {totalSub,doneSub,pct};
}

function topicPct(t){
  if(!t.subtopics.length) return 0;
  return Math.round(t.subtopics.filter(s=>s.done).length/t.subtopics.length*100);
}

function renderSidebar(){
  const el=document.getElementById('proj-list');
  if(!data.projects.length){ el.innerHTML='<div style="color:var(--muted);font-size:12px;padding:6px 0">No projects yet.</div>'; return; }
  el.innerHTML=data.projects.map(p=>{
    const {doneSub,totalSub,pct}=projStats(p);
    return `<div class="proj-item${p.id===active?' active':''}" onclick="selectProject('${p.id}')">
      <div class="proj-item-name">${esc(p.name)}</div>
      <div class="proj-item-meta"><span>${doneSub}/${totalSub}</span><div class="mini-bar"><div class="mini-fill${pct===100?' c':''}" style="width:${pct}%"></div></div><span>${pct}%</span></div>
    </div>`;
  }).join('');
}

function renderProject(){
  const p=data.projects.find(p=>p.id===active);
  if(!p){ showEmpty(); return; }
  document.getElementById('empty').style.display='none';
  document.getElementById('pview').style.display='block';
  document.getElementById('v-name').textContent=p.name;
  document.getElementById('v-desc').textContent=p.desc||'';
  const {totalSub,doneSub,pct}=projStats(p);
  const comp=pct===100&&totalSub>0;
  document.getElementById('s-topics').textContent=p.topics.length;
  document.getElementById('s-sub').textContent=totalSub;
  document.getElementById('s-done').textContent=doneSub;
  document.getElementById('s-pct').textContent=pct+'%';
  const bf=document.getElementById('big-fill');
  bf.style.width=pct+'%'; bf.className='big-fill'+(comp?' c':'');
  const badge=document.getElementById('v-badge');
  badge.textContent=comp?'complete':'in progress';
  badge.className='badge '+(comp?'badge-done':'badge-todo');

  const list=document.getElementById('topics-list');
  const noT=document.getElementById('no-topics');
  if(!p.topics.length){ list.innerHTML=''; noT.style.display='block'; return; }
  noT.style.display='none';

  list.innerHTML=p.topics.map(t=>{
    const tp=topicPct(t);
    const allDone=t.subtopics.length>0&&t.subtopics.every(s=>s.done);
    const isOpen=openTopics.has(t.id);
    const doneCount=t.subtopics.filter(s=>s.done).length;
    return `<div class="topic-block${allDone?' done-block':''}" id="tb-${t.id}">
      <div class="topic-row" onclick="toggleExpand('${t.id}')">
        <div class="check" onclick="event.stopPropagation()">
          <svg class="chk-svg" viewBox="0 0 9 7" fill="none"><path d="M1 3.5l2.5 2.5 4.5-5" stroke="#0e0e0e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="topic-info">
          <div class="topic-title">${esc(t.name)}</div>
          ${t.exp?`<div class="topic-sub-count">${esc(t.exp)}</div>`:''}
          <div class="topic-sub-count" style="margin-top:2px">${doneCount}/${t.subtopics.length} subtopics</div>
        </div>
        <div class="topic-right">
          <span class="topic-pct">${tp}%</span>
          <button class="expand-btn${isOpen?' open':''}" onclick="event.stopPropagation();toggleExpand('${t.id}')" aria-label="expand">▶</button>
          <div class="t-actions" onclick="event.stopPropagation()">
            <button class="btn-del" onclick="delTopic('${t.id}')">✕</button>
          </div>
        </div>
      </div>
      ${isOpen?`<div class="subtopics-panel">
        ${t.subtopics.map(s=>`
          <div class="sub-item${s.done?' sdone':''}" onclick="toggleSub('${t.id}','${s.id}')">
            <div class="sub-check">
              <svg class="sub-chk-svg" viewBox="0 0 7 6" fill="none"><path d="M1 3l2 2 3-4" stroke="#0e0e0e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <span class="sub-name">${esc(s.name)}</span>
            <button class="sub-copy" onclick="event.stopPropagation();copySub(this,\`${s.name.replace(/`/g,'\\`')}\`)" aria-label="copy" title="Copy">⎘</button>
            <button class="sub-del" onclick="event.stopPropagation();delSub('${t.id}','${s.id}')" aria-label="delete">✕</button>
          </div>`).join('')}
        <div class="sub-add-row">
          <input type="text" id="si-${t.id}" placeholder="Add subtopic..." onkeydown="if(event.key==='Enter')addSubtopic('${t.id}')">
          <button onclick="addSubtopic('${t.id}')">+ Add</button>
        </div>
      </div>`:''}
    </div>`;
  }).join('');
}

function showEmpty(){
  document.getElementById('empty').style.display='flex';
  document.getElementById('pview').style.display='none';
}

function updateHeader(){
  document.getElementById('h-proj').textContent=data.projects.length;
  let tot=0,dn=0;
  data.projects.forEach(p=>p.topics.forEach(t=>{ tot+=t.subtopics.length; dn+=t.subtopics.filter(s=>s.done).length; }));
  document.getElementById('h-total').textContent=tot;
  document.getElementById('h-done').textContent=dn;
}

function copySub(btn,text){
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent='✓';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='⎘';btn.classList.remove('copied');},1200);
  });
}
document.getElementById('pname').addEventListener('keydown',e=>{if(e.key==='Enter')addProject();});
document.getElementById('tname').addEventListener('keydown',e=>{if(e.key==='Enter')addTopic();});

renderSidebar(); updateHeader();
if(data.projects.length) selectProject(data.projects[0].id);
</script>
